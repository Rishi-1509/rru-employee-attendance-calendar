<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faculty Leave Calendar - Internal Attendance Management System">
    <title>Faculty Leave Calendar — Login</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗓️</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="login-card glass-panel">
            <div class="login-logo">🗓️</div>
            <h1 class="login-title">Leave Calendar</h1>
            <p class="login-subtitle">Faculty Attendance Management System</p>

            <div id="login-error" class="login-error"></div>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="Username"
                        autocomplete="username"
                        required
                    >
                </div>
                <div class="form-group">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Password"
                        autocomplete="current-password"
                        required
                    >
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary">
                    Sign In
                </button>
            </form>


            <div class="login-footer">
                <p>Faculty Attendance Management System &copy; 2026</p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
